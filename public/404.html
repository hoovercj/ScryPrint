<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting…</title>
  <script>
    // Redirect case-insensitive matches of /ScryPrint/ to the correct casing
    var path = location.pathname;
    if (path.toLowerCase().startsWith('/scryprint')) {
      var corrected = '/ScryPrint' + path.slice('/scryprint'.length);
      location.replace(location.origin + corrected + location.search + location.hash);
    }
  </script>
</head>
<body>
  <p>Redirecting…</p>
</body>
</html>
